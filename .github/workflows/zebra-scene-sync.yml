name: Zebra scene sync

on:
  schedule:
    - cron: "3-58/5 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: zebra-scene-sync
  cancel-in-progress: false

jobs:
  sync:
    name: Validate and update the Zebra scene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out trusted sync code
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          ref: ${{ github.sha }}
          path: automation
          fetch-depth: 1
          persist-credentials: false

      - name: Claim a queued editor checkpoint
        id: claim
        env:
          CLAIM_FILE: ${{ runner.temp }}/zebra-sync/claim.json
          SYNC_SECRET: ${{ secrets.ZEBRA_SYNC_SECRET }}
          SYNC_URL: https://zebra-scene-editor.timofeymarkin98.workers.dev
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          mkdir -p "$(dirname "$CLAIM_FILE")"
          code="$(curl --silent --show-error --retry 2 --retry-all-errors --connect-timeout 10 --max-time 90 --max-filesize 1048576 \
            --output "$CLAIM_FILE" --write-out '%{http_code}' \
            --request POST "$SYNC_URL/api/github-sync/claim" \
            --header "Authorization: Bearer $SYNC_SECRET" \
            --header 'Content-Type: application/json' \
            --data "{\"runnerId\":\"${GITHUB_RUN_ID}\"}")"
          if [ "$code" = "204" ]; then
            echo "pending=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$code" != "200" ]; then
            echo "The Zebra editor claim endpoint returned HTTP $code." >&2
            exit 1
          fi
          CLAIM_FILE="$CLAIM_FILE" node --input-type=module -e '
            import fs from "node:fs";
            const claim = JSON.parse(fs.readFileSync(process.env.CLAIM_FILE, "utf8"));
            const uuid = /^[a-f0-9]{8}-[a-f0-9]{4}-[1-8][a-f0-9]{3}-[89ab][a-f0-9]{3}-[a-f0-9]{12}$/i, sha = /^[0-9a-f]{40}$/i, digest = /^[0-9a-f]{64}$/i;
            const assetId = /^asset-upload-[0-9a-f]{48}$/, assetDigest = /^[0-9a-f]{64}$/, assetKeys = ["bytes", "fileName", "format", "id", "name", "sha256", "type"];
            if (claim.pending !== true || !uuid.test(claim.requestId) || !uuid.test(claim.leaseId) || !sha.test(claim.expectedGitHead)) throw new Error("Invalid Zebra claim identity.");
            if (!digest.test(claim.compactSha256)) throw new Error("Invalid compact Zebra digest.");
            if (!Array.isArray(claim.uploadedAssets)) throw new Error("Invalid Zebra uploaded asset manifest.");
            const ids = new Set();
            let uploadedBytes = 0;
            for (const asset of claim.uploadedAssets) {
              if (!asset || typeof asset !== "object" || Array.isArray(asset) || Object.keys(asset).sort().join(",") !== assetKeys.join(",")) throw new Error("Invalid Zebra uploaded asset manifest entry.");
              if (!assetId.test(asset.id) || asset.fileName !== `${asset.id}.glb` || asset.type !== "model" || asset.format !== "glb") throw new Error("Invalid Zebra uploaded asset identity.");
              if (typeof asset.name !== "string" || !asset.name.trim() || asset.name.length > 80 || /[\u0000-\u001f\u007f]/.test(asset.name)) throw new Error("Invalid Zebra uploaded asset name.");
              if (!Number.isSafeInteger(asset.bytes) || asset.bytes <= 0 || asset.bytes > 8 * 1024 * 1024 || !assetDigest.test(asset.sha256)) throw new Error("Invalid Zebra uploaded asset receipt.");
              if (ids.has(asset.id)) throw new Error("The Zebra claim repeats an uploaded asset.");
              ids.add(asset.id);
              uploadedBytes += asset.bytes;
            }
            if (uploadedBytes > 32 * 1024 * 1024) throw new Error("The Zebra uploaded asset manifest exceeds the project limit.");
            if (claim.repository !== "Sparkah/zebra-circus-game" || claim.branch !== "agent/game-port-studio-integration" || claim.path !== "zebra-circus.scene.json") throw new Error("The Zebra claim escaped its fixed repository target.");
            fs.appendFileSync(process.env.GITHUB_OUTPUT, `pending=true\nrequest_id=${claim.requestId}\nlease_id=${claim.leaseId}\nexpected_head=${claim.expectedGitHead}\ncompact_sha=${claim.compactSha256}\n`);
          '

      - name: Check out the review branch without executing it
        if: steps.claim.outputs.pending == 'true'
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262
        with:
          repository: Sparkah/zebra-circus-game
          ref: agent/game-port-studio-integration
          path: target
          fetch-depth: 2
          persist-credentials: true
          sparse-checkout: zebra-circus.scene.json
          sparse-checkout-cone-mode: false

      - name: Download lease-bound uploaded models
        if: steps.claim.outputs.pending == 'true'
        env:
          ASSET_DIR: ${{ runner.temp }}/zebra-sync/uploads
          CLAIM_FILE: ${{ runner.temp }}/zebra-sync/claim.json
          LEASE_ID: ${{ steps.claim.outputs.lease_id }}
          REQUEST_ID: ${{ steps.claim.outputs.request_id }}
          SYNC_SECRET: ${{ secrets.ZEBRA_SYNC_SECRET }}
          SYNC_URL: https://zebra-scene-editor.timofeymarkin98.workers.dev
        shell: bash
        run: |
          set -euo pipefail
          umask 077
          mkdir -p "$ASSET_DIR"
          node --input-type=module -e '
            import crypto from "node:crypto";
            import path from "node:path";
            import { readFile, writeFile } from "node:fs/promises";

            const MAX_ASSET_BYTES = 8 * 1024 * 1024;
            const MAX_PROJECT_BYTES = 32 * 1024 * 1024;
            const assetId = /^asset-upload-[0-9a-f]{48}$/;
            const digest = /^[0-9a-f]{64}$/;
            const assetKeys = ["bytes", "fileName", "format", "id", "name", "sha256", "type"];
            const claim = JSON.parse(await readFile(process.env.CLAIM_FILE, "utf8"));
            if (claim.requestId !== process.env.REQUEST_ID || claim.leaseId !== process.env.LEASE_ID || !Array.isArray(claim.uploadedAssets)) {
              throw new Error("The Zebra asset download identity does not match the validated claim.");
            }
            if (!process.env.SYNC_SECRET) throw new Error("The Zebra sync secret is unavailable.");
            const ids = new Set();
            let declaredTotal = 0;
            for (const entry of claim.uploadedAssets) {
              if (!entry || typeof entry !== "object" || Array.isArray(entry) || Object.keys(entry).sort().join(",") !== assetKeys.join(",")) throw new Error("Invalid Zebra uploaded asset manifest entry.");
              if (!assetId.test(entry.id) || entry.fileName !== `${entry.id}.glb` || entry.type !== "model" || entry.format !== "glb") throw new Error("Invalid Zebra uploaded asset identity.");
              if (typeof entry.name !== "string" || !entry.name.trim() || entry.name.length > 80 || /[\u0000-\u001f\u007f]/.test(entry.name)) throw new Error("Invalid Zebra uploaded asset name.");
              if (!Number.isSafeInteger(entry.bytes) || entry.bytes <= 0 || entry.bytes > MAX_ASSET_BYTES || !digest.test(entry.sha256)) throw new Error("Invalid Zebra uploaded asset receipt.");
              if (ids.has(entry.id)) throw new Error("The Zebra claim repeats an uploaded asset.");
              ids.add(entry.id);
              declaredTotal += entry.bytes;
            }
            if (declaredTotal > MAX_PROJECT_BYTES) throw new Error("The Zebra uploaded asset manifest exceeds the project limit.");

            const base = new URL(process.env.SYNC_URL);
            if (base.protocol !== "https:" || base.username || base.password) throw new Error("The Zebra asset service URL is invalid.");
            for (const entry of claim.uploadedAssets) {
              const endpoint = new URL(`/api/github-sync/assets/${encodeURIComponent(claim.requestId)}/${encodeURIComponent(entry.id)}`, base);
              const response = await fetch(endpoint, {
                headers: {
                  Authorization: `Bearer ${process.env.SYNC_SECRET}`,
                  "X-Sync-Lease-Id": claim.leaseId,
                  Accept: "model/gltf-binary"
                },
                redirect: "error"
              });
              if (!response.ok || !response.body) throw new Error(`Zebra asset ${entry.id} download failed with HTTP ${response.status}.`);
              const contentLength = response.headers.get("content-length");
              if (contentLength !== null && (!/^\d+$/.test(contentLength) || Number(contentLength) !== entry.bytes || Number(contentLength) > MAX_ASSET_BYTES)) {
                throw new Error(`Zebra asset ${entry.id} returned an invalid Content-Length.`);
              }
              const chunks = [];
              let received = 0;
              const reader = response.body.getReader();
              for (;;) {
                const { done, value } = await reader.read();
                if (done) break;
                received += value.byteLength;
                if (received > entry.bytes || received > MAX_ASSET_BYTES) {
                  await reader.cancel();
                  throw new Error(`Zebra asset ${entry.id} exceeded its guarded byte length.`);
                }
                chunks.push(Buffer.from(value));
              }
              if (received !== entry.bytes) throw new Error(`Zebra asset ${entry.id} did not match its declared byte length.`);
              const bytes = Buffer.concat(chunks, received);
              const actualDigest = crypto.createHash("sha256").update(bytes).digest("hex");
              if (actualDigest !== entry.sha256) throw new Error(`Zebra asset ${entry.id} did not match its hosted digest.`);
              await writeFile(path.join(process.env.ASSET_DIR, entry.fileName), bytes, { flag: "wx", mode: 0o600 });
            }
            process.stdout.write(`Verified ${claim.uploadedAssets.length} uploaded Zebra model(s).\n`);
          '

      - name: Validate the exact scene and expected Git parent
        if: steps.claim.outputs.pending == 'true'
        id: prepare
        env:
          CLAIM_FILE: ${{ runner.temp }}/zebra-sync/claim.json
          EXPECTED_HEAD: ${{ steps.claim.outputs.expected_head }}
          OUTPUT_SCENE: ${{ runner.temp }}/zebra-sync/validated.scene.json
          UPLOAD_DIR: ${{ runner.temp }}/zebra-sync/uploads
        shell: bash
        run: |
          set -euo pipefail
          actual_head="$(git -C target rev-parse HEAD)"
          baseline="$RUNNER_TEMP/zebra-sync/baseline.scene.json"
          if [ "$actual_head" = "$EXPECTED_HEAD" ]; then
            cp target/zebra-circus.scene.json "$baseline"
            already_pushed=false
          else
            parent="$(git -C target rev-parse HEAD^)"
            changed="$(git -C target diff-tree --no-commit-id --name-only -r HEAD)"
            if [ "$parent" != "$EXPECTED_HEAD" ] || [ "$changed" != "zebra-circus.scene.json" ]; then
              echo "The review branch moved outside the queued one-file Zebra update." >&2
              exit 1
            fi
            git -C target show "$EXPECTED_HEAD:zebra-circus.scene.json" > "$baseline"
            already_pushed=true
          fi
          node automation/.github/scripts/zebra-scene-sync-validator.mjs "$baseline" "$CLAIM_FILE" "$OUTPUT_SCENE" "$UPLOAD_DIR"
          if [ "$already_pushed" = true ]; then
            cmp --silent "$OUTPUT_SCENE" target/zebra-circus.scene.json || {
              echo "The existing child commit does not contain the queued Zebra scene." >&2
              exit 1
            }
            commit_sha="$actual_head"
          else
            mv "$OUTPUT_SCENE" target/zebra-circus.scene.json
            git -C target diff --quiet -- zebra-circus.scene.json && {
              echo "The queued revision contains no GitHub scene change." >&2
              exit 1
            }
            changed="$(git -C target diff --name-only)"
            [ "$changed" = "zebra-circus.scene.json" ] || {
              echo "The prepared update changed more than the Zebra scene file." >&2
              exit 1
            }
            commit_sha=""
          fi
          echo "already_pushed=$already_pushed" >> "$GITHUB_OUTPUT"
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"

      - name: Commit and push the validated scene
        if: steps.claim.outputs.pending == 'true' && steps.prepare.outputs.already_pushed != 'true'
        id: publish
        shell: bash
        run: |
          set -euo pipefail
          git -C target config user.name "Zebra Scene Editor"
          git -C target config user.email "zebra-scene-editor@users.noreply.github.com"
          git -C target add -- zebra-circus.scene.json
          [ "$(git -C target diff --cached --name-only)" = "zebra-circus.scene.json" ]
          git -C target commit -m "Update Zebra scene from live editor"
          commit_sha="$(git -C target rev-parse HEAD)"
          [ "$(git -C target rev-parse HEAD^)" = "${{ steps.claim.outputs.expected_head }}" ]
          if ! git -C target push origin HEAD:refs/heads/agent/game-port-studio-integration; then
            remote_sha="$(git -C target ls-remote origin refs/heads/agent/game-port-studio-integration | cut -f1)"
            [ "$remote_sha" = "$commit_sha" ] || exit 1
          fi
          echo "commit_sha=$commit_sha" >> "$GITHUB_OUTPUT"

      - name: Verify the GitHub update with the editor
        if: steps.claim.outputs.pending == 'true'
        id: complete
        env:
          COMMIT_SHA: ${{ steps.publish.outputs.commit_sha || steps.prepare.outputs.commit_sha }}
          COMPACT_SHA: ${{ steps.claim.outputs.compact_sha }}
          COMPLETE_FILE: ${{ runner.temp }}/zebra-sync/complete.json
          EXPECTED_HEAD: ${{ steps.claim.outputs.expected_head }}
          LEASE_ID: ${{ steps.claim.outputs.lease_id }}
          REQUEST_ID: ${{ steps.claim.outputs.request_id }}
          SYNC_SECRET: ${{ secrets.ZEBRA_SYNC_SECRET }}
          SYNC_URL: https://zebra-scene-editor.timofeymarkin98.workers.dev
        shell: bash
        run: |
          set -euo pipefail
          commit_parent_sha="$(git -C target rev-parse "${COMMIT_SHA}^")"
          changed_paths="$(git -C target diff-tree --no-commit-id --name-only -r "$COMMIT_SHA")"
          remote_head_sha="$(git -C target ls-remote origin refs/heads/agent/game-port-studio-integration | cut -f1)"
          [ "$commit_parent_sha" = "$EXPECTED_HEAD" ]
          [ "$changed_paths" = "zebra-circus.scene.json" ]
          [ "$remote_head_sha" = "$COMMIT_SHA" ]
          export COMMIT_PARENT_SHA="$commit_parent_sha" REMOTE_HEAD_SHA="$remote_head_sha"
          node --input-type=module -e '
            import crypto from "node:crypto";
            import fs from "node:fs";
            const bytes = fs.readFileSync("target/zebra-circus.scene.json");
            const header = Buffer.from(`blob ${bytes.length}\0`);
            const gitBlobSha = crypto.createHash("sha1").update(header).update(bytes).digest("hex");
            fs.writeFileSync(process.env.COMPLETE_FILE, JSON.stringify({
              status: "complete",
              requestId: process.env.REQUEST_ID,
              leaseId: process.env.LEASE_ID,
              commitSha: process.env.COMMIT_SHA,
              compactSha256: process.env.COMPACT_SHA,
              gitBlobSha,
              expectedGitHead: process.env.EXPECTED_HEAD,
              commitParentSha: process.env.COMMIT_PARENT_SHA,
              remoteHeadSha: process.env.REMOTE_HEAD_SHA,
              repository: "Sparkah/zebra-circus-game",
              branch: "agent/game-port-studio-integration",
              path: "zebra-circus.scene.json",
              changedPaths: ["zebra-circus.scene.json"]
            }));
          '
          curl --silent --show-error --fail-with-body --retry 2 --retry-all-errors --connect-timeout 10 --max-time 90 \
            --request POST "$SYNC_URL/api/github-sync/complete" \
            --header "Authorization: Bearer $SYNC_SECRET" \
            --header 'Content-Type: application/json' \
            --data-binary "@$COMPLETE_FILE" > /dev/null

      - name: Return a pre-push failure to the editor
        if: failure() && steps.claim.outputs.pending == 'true' && steps.publish.outcome != 'success' && steps.prepare.outputs.already_pushed != 'true'
        continue-on-error: true
        env:
          FAILURE_FILE: ${{ runner.temp }}/zebra-sync/failure.json
          LEASE_ID: ${{ steps.claim.outputs.lease_id }}
          REQUEST_ID: ${{ steps.claim.outputs.request_id }}
          SYNC_SECRET: ${{ secrets.ZEBRA_SYNC_SECRET }}
          SYNC_URL: https://zebra-scene-editor.timofeymarkin98.workers.dev
        shell: bash
        run: |
          node --input-type=module -e '
            import fs from "node:fs";
            fs.writeFileSync(process.env.FAILURE_FILE, JSON.stringify({ status: "failed", requestId: process.env.REQUEST_ID, leaseId: process.env.LEASE_ID, message: `GitHub sync validation failed in run ${process.env.GITHUB_RUN_ID}.` }));
          '
          curl --silent --show-error --fail-with-body --connect-timeout 10 --max-time 90 \
            --request POST "$SYNC_URL/api/github-sync/complete" \
            --header "Authorization: Bearer $SYNC_SECRET" \
            --header 'Content-Type: application/json' \
            --data-binary "@$FAILURE_FILE" > /dev/null
